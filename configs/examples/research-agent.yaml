# ============================================================
# EXAMPLE POLICY — DO NOT DEPLOY UNMODIFIED.
# Webhook URLs and secrets in this file are placeholders.
# Replace any https://example.invalid/... URL before deploying.
# ============================================================
# AgentGuard Policy: Research Agent
# Permissive read access, strict write controls.
#
# See docs/POLICY_REFERENCE.md for the full schema. Evaluation per scope
# is: rate-limit → deny → require_approval → allow → default DENY.

version: "1"
name: "research-agent-policy"
description: "Policy for AI research agents — broad read access to the web, restricted writes and API usage"

rules:
  # --- Network: Broad read access, restricted APIs ---
  # NOTE: `*.wikipedia.org` matches `en.wikipedia.org` but NOT the apex
  # `wikipedia.org`. Add the apex explicitly if agents might hit it.
  - scope: network
    allow:
      - domain: "*.wikipedia.org"
      - domain: "*.arxiv.org"
      - domain: "scholar.google.com"
      - domain: "*.semanticscholar.org"
      - domain: "*.github.com"
      - domain: "*.stackoverflow.com"
      - domain: "api.openai.com"
      - domain: "api.anthropic.com"
    deny:
      - domain: "*.social-media.com"
        message: "Social media access blocked for research agents"
    # Per-instance rate limit; scales with replica count.
    rate_limit:
      max_requests: 120
      window: "1m"

  # --- Browser: Open browsing with guardrails ---
  # Denies run before `allow: "*"`. First-match-wins means a missed
  # pattern in deny is an escape hatch — be conservative here.
  - scope: browser
    deny:
      - domain: "*.bank.*"
        message: "Financial sites are off-limits"
      - domain: "mail.*"     # mail.google.com ✓, mail.yahoo.co.jp ✓
        message: "Email access blocked"
      - domain: "*.admin.*"
        message: "Admin panels blocked"
    allow:
      - domain: "*"          # Fallback allow — everything not denied above.

  # --- Shell: Data processing only ---
  # `*` in shell patterns crosses spaces AND slashes. Keep patterns
  # tight — e.g. `rm *` also matches `rm -rf /` because `*` greedy-matches.
  - scope: shell
    allow:
      - pattern: "python *"
      - pattern: "node *"
      - pattern: "grep *"
      - pattern: "wc *"
      - pattern: "head *"
      - pattern: "tail *"
      - pattern: "sort *"
      - pattern: "jq *"
    require_approval:
      - pattern: "pip install *"
      - pattern: "npm install *"
    deny:
      - pattern: "sudo *"
      - pattern: "rm *"
      - pattern: "curl * | *"
        message: "Piped curl commands blocked — use Python requests instead"

  # --- Filesystem ---
  # `paths` always uses forward slashes post-normalization (filepath.Clean
  # + ToSlash). `..` segments are rejected at policy load.
  - scope: filesystem
    allow:
      - action: read
        paths: ["**"]
      - action: write
        paths: ["./research/**", "./output/**", "/tmp/**"]
    deny:
      # `~/**` is matched literally — `~` is NOT expanded to the home dir
      # by AgentGuard. Agents passing an expanded path like `/home/alice/foo`
      # won't hit this rule; use `/home/**` or `/root/**` instead.
      - action: write
        paths: ["/etc/**", "~/**"]
      - action: delete
        paths: ["**"]
        message: "Research agents cannot delete files"

  # --- Data (form inputs, browser data submissions) ---
  # Research agents browse a lot but should never submit credentials or
  # financial details into web forms. Pattern matching runs against the
  # (redacted) Command field — the browser-use adapter scrubs Bearer
  # tokens, AWS/GCP keys, and the like before transmission, so these
  # patterns target the residual structured PII shapes operators have
  # historically seen leak. Domain matching gates by submission target.
  - scope: data
    deny:
      - pattern: "*ssn:*"
        message: "SSN values must not be submitted to web forms"
      # Loose credit-card heuristic — 13-19 contiguous digits with optional separators.
      - pattern: "*[0-9][0-9][0-9][0-9] *[0-9][0-9][0-9][0-9]*"
        message: "Card-number-shaped value blocked"
      - domain: "*.bank.*"
        message: "Form submissions to banking sites are blocked"
    allow:
      - domain: "*.arxiv.org"
      - domain: "scholar.google.com"
      - domain: "*.wikipedia.org"

  # --- Cost ---
  # Session totals are accumulated in-memory per `session_id`, per-instance
  # only. Restart loses totals. `alert_threshold` promotes a single action
  # above that amount to REQUIRE_APPROVAL without reserving the cost;
  # `max_per_*` enforce hard DENY.
  - scope: cost
    limits:
      max_per_action: "$0.25"
      max_per_session: "$15.00"
      alert_threshold: "$10.00"

notifications:
  approval_required:
    - type: console
  on_deny:
    - type: log
      level: info
