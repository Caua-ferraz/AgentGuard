name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Validate default policy
        run: go run ./cmd/agentguard validate --policy configs/default.yaml

      - name: Validate example policies
        run: |
          for f in configs/examples/*.yaml; do
            echo "Validating $f..."
            go run ./cmd/agentguard validate --policy "$f"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentguard:latest .

      - name: Test Docker image
        run: |
          docker run -d --name ag-test -p 8080:8080 agentguard:latest
          sleep 3
          curl -f http://localhost:8080/health
          docker stop ag-test
