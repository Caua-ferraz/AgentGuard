name: CI

# Triggers:
#   - push to any branch (so feature-branch commits get CI feedback).
#   - pull_request targeting any branch (catches forks + branch-to-branch PRs).
#   - schedule (Monday 06:00 UTC) so the integration-tests job runs against
#     fresh upstream framework releases at least once a week, even if no
#     PRs land.
# Explicit "**" branch glob keeps any future branch-protection rules working.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # Monday 06:00 UTC. Catches new framework majors that broke our pinned
    # adapters before a customer files an issue.
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      # Hot-path p99 latency gate (CLAUDE.md: "Latency is God", <3ms p99).
      # Run the focused Engine.Check gate (with the persistence syncer active)
      # plus the full HTTP /v1/check persistence-on latency check as a named,
      # standalone step so a latency regression breaks CI with an obvious
      # signal instead of hiding inside the broad `go test ./...` run above.
      # No -race here: the race detector's instrumentation distorts timing.
      - name: Hot-path p99 latency gate
        run: |
          go test -run '^TestEngineCheck_P99LatencyGate$' -count=1 -v ./pkg/policy
          go test -run '^TestIntegration_HotPathLatencyWithPersistence$' -count=1 -v ./pkg/persist

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: warn

      - name: Validate default policy
        run: go run ./cmd/agentguard validate --policy configs/default.yaml

      - name: Validate example policies
        run: |
          for f in configs/examples/*.yaml; do
            echo "Validating $f..."
            go run ./cmd/agentguard validate --policy "$f"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  # CVE scan with reachability analysis. govulncheck only flags advisories
  # whose vulnerable symbol is actually called from our code, so it stays
  # quiet on theoretical issues in unused transitive code paths. Blocking
  # on purpose: AgentGuard is a security product and cannot ship with a
  # known-reachable advisory. If govulncheck fires, fix the advisory before
  # merging (bump the dep, or refactor away the call site).
  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # Unified dependency safety audit across all three ecosystems (Go module,
  # Python SDK, TypeScript SDK). Complements `vulncheck` above:
  #   - govulncheck = live, reachability-based Go *security* gate.
  #   - dep-audit   = cross-ecosystem security (live OSV.dev per pinned version)
  #                   + *performance-regression* gate (perf has no automated DB,
  #                   so a curated registry is the source of truth) + one report.
  # A dependency passes if it is on the latest version OR behind-but-clean; it
  # fails ONLY when its current version has a known security vuln or perf
  # regression that an available upgrade resolves. Registry: pkg/depaudit/
  # advisories.json (see advisories.md).
  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      # Blocking gate. Security is verified live against OSV.dev per exact
      # pinned version (DEPAUDIT_ONLINE=1); performance comes from the in-repo
      # registry. OSV findings *add* failures but a network/OSV outage degrades
      # to registry-only rather than flaking, so the gate never goes red on
      # infrastructure. Fails the build on a known-vulnerable or perf-regressed
      # pin with an available fix.
      - name: Dependency safety gate (OSV.dev + registry)
        env:
          DEPAUDIT_ONLINE: '1'
        run: go test -run '^TestDependencyAudit_Gate$' -count=1 -v ./pkg/depaudit

      # Canary: proves the live OSV.dev integration actually flags known-bad
      # versions, so a green gate means "checked & clean" and never "silently
      # not checking". Fails only if OSV responds but our query/parser misses a
      # known vuln; skips (does not flake) when OSV is unreachable.
      - name: OSV.dev integration canary
        env:
          DEPAUDIT_ONLINE: '1'
        run: go test -run '^TestDependencyAudit_OSVCanary$' -count=1 -v ./pkg/depaudit

      # Informational report: current vs latest, safe?, reason — for every
      # dependency. Live lookups (Go proxy / PyPI / npm + OSV.dev) populate the
      # "latest" column and the verification source; failures degrade gracefully
      # without failing the step.
      - name: Dependency audit report (current vs latest)
        env:
          DEPAUDIT_ONLINE: '1'
        run: go test -run '^TestDependencyAudit_Report$' -count=1 -v ./pkg/depaudit

      # Live npm advisory discovery for the TS SDK (dev-only deps, lockfile
      # present). Non-blocking: surfaces new advisories to triage into the
      # registry without gating an unrelated transitive bump. The blocking
      # teeth are the Go gate above + govulncheck.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm audit (TypeScript SDK, informational)
        working-directory: plugins/typescript
        continue-on-error: true
        run: npm audit --omit=optional

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.10 is the floor (pyproject.toml requires-python = ">=3.10"); 3.11
        # and 3.12 are intermediate; 3.13 is the current stable and is also
        # declared in the trove classifiers, so it must be exercised here.
        # 3.9 was dropped after upstream EOL (October 2025) and because the
        # `mcp` extra requires >=3.10 anyway — keeping 3.9 in the matrix only
        # invited broken installs.
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      # Go is needed so we can build the agentguard binary. The Python E2E
      # tests (tests/test_end_to_end_real_server.py) spawn the real binary
      # and drive it through the Python SDK; without Go, those tests SKIP
      # silently and pretend to be green.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Build agentguard binary for E2E tests
        run: go build -o agentguard ./cmd/agentguard

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        working-directory: plugins/python
        # Adapter unit tests (test_adapters.py, test_crewai.py, test_mcp*.py,
        # etc.) import the real langchain_core, crewai, and mcp packages —
        # the adapter modules raise ImportError at collection time when
        # they're missing. Installing the extras here keeps the suite from
        # silently skipping or hard-failing on import.
        #
        # `browser-use` is intentionally excluded: pulls Playwright + ~200MB
        # of Chromium and is exercised by the integration-tests matrix.
        run: pip install -e ".[dev,langchain,crewai,mcp]"

      - name: Run Python tests
        working-directory: plugins/python
        # The E2E suite (test_end_to_end_real_server.py) MUST execute — if
        # the binary isn't discoverable it silently skips, which masks real
        # regressions. We run those tests with --runxfail and a non-skipped
        # assertion below.
        #
        # `-m "not integration"` deselects the real-framework integration
        # suite (plugins/python/tests/integration/), which has its own job
        # (`integration-tests`) below. The integration job installs the
        # framework extras; this job stays lean.
        run: |
          pytest -v --tb=short -m "not integration" --cov=agentguard --cov-report=term-missing -p no:cacheprovider

      - name: Assert E2E tests actually ran (no silent skip)
        working-directory: plugins/python
        run: |
          # Re-run only the E2E file with -ra; count "PASSED" lines, which
          # must be > 0. If the binary path breaks, every test will be
          # "SKIPPED" and the count will be 0, failing the job.
          passed=$(pytest tests/test_end_to_end_real_server.py -v --no-header 2>&1 | grep -c "PASSED" || true)
          echo "E2E passed count: $passed"
          if [ "$passed" -lt 10 ]; then
            echo "ERROR: E2E tests skipped silently; expected >=10 passes, got $passed"
            exit 1
          fi

  # Real-framework integration tests. Each matrix entry installs ONE
  # framework extra and runs only its targeted integration test file —
  # keeps install time bounded and isolates per-framework breakage.
  #
  # Non-blocking (`continue-on-error: true`) BY DESIGN — reaffirmed for v1.0.
  # These tests pin to LIVE upstream framework releases (langchain, crewai,
  # browser-use), so a red leg usually means upstream drift, not an AgentGuard
  # regression; gating PR merges on it would let an unrelated framework release
  # block every merge. Failures still surface (the red leg + the weekly cron
  # run), and the per-framework matrix isolates which one broke. The
  # AgentGuard-owned contract is covered by the BLOCKING `python-test` job's
  # adapter unit tests; this job is the higher-fidelity, lower-stability coupon.
  #
  # The browser-use leg additionally requires Chromium binaries via
  # `playwright install`; if that step fails (network flake, missing
  # libs), only that matrix row goes red.
  integration-tests:
    runs-on: ubuntu-latest
    # Non-blocking by design (see header); weekly cron + PR annotation surface failures.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        framework: [langchain, crewai, browser-use]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (build agentguard binary)
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Build agentguard binary
        run: go build -o agentguard ./cmd/agentguard

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AgentGuard SDK + framework extra (${{ matrix.framework }})
        working-directory: plugins/python
        run: |
          pip install --upgrade pip
          pip install -e ".[${{ matrix.framework }},dev]"

      - name: Install Playwright browsers (browser-use only)
        if: matrix.framework == 'browser-use'
        working-directory: plugins/python
        run: |
          # Heavyweight: downloads ~200MB of Chromium. Marked
          # `continue-on-error: true` at the job level so a transient
          # CDN failure here does not block PRs.
          python -m playwright install --with-deps chromium

      - name: Run integration tests (${{ matrix.framework }})
        working-directory: plugins/python
        env:
          # The integration tests assume the SDK can find the AgentGuard
          # mock URL via the per-test fixture — but a few helpers fall
          # back to AGENTGUARD_URL. Pin it so a leaked env var from the
          # runner image doesn't smuggle in a real proxy.
          AGENTGUARD_URL: http://127.0.0.1:0
        run: |
          # Each framework's integration file is run in isolation — this
          # makes the matrix output cleaner and surfaces a per-framework
          # break without burying it under the others' output.
          fname=test_real_${{ matrix.framework == 'browser-use' && 'browseruse' || matrix.framework }}.py
          pytest -v -m integration "tests/integration/${fname}"

  typescript-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 20 is the floor (package.json engines.node = ">=20.0.0"); 22 is
        # Maintenance LTS; 24 is the current Active LTS. Node 18 was dropped
        # after upstream EOL (2025-04-30). v0.5 R1 E2 closed.
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install TS SDK deps
        working-directory: plugins/typescript
        run: npm install

      - name: Typecheck + build
        working-directory: plugins/typescript
        run: npm run build

      - name: Test
        working-directory: plugins/typescript
        run: npm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentguard:ci .

      - name: Smoke test the container
        run: |
          # Start the image with --api-key so it binds to 0.0.0.0 (reachable
          # from the host via port publish). Then poll /health until it
          # responds, and tear down.
          docker run -d --name agentguard-ci -p 18080:8080 agentguard:ci \
            serve \
              --policy /etc/agentguard/default.yaml \
              --port 8080 \
              --api-key ci-smoke-key \
              --audit-log /var/lib/agentguard/audit.jsonl \
              --dashboard
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:18080/health >/dev/null; then
              echo "health ok"
              break
            fi
            sleep 1
            if [ "$i" = "20" ]; then
              echo "server failed to start; logs:"
              docker logs agentguard-ci
              exit 1
            fi
          done
          docker rm -f agentguard-ci
